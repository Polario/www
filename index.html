<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Polario - F-22 AI Wingman</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="cockpit">
        <!-- HUD Overlay -->
        <div class="hud-overlay">
            <h1 class="callsign">POLARIO</h1>
            <p class="status">AI Wingman: Locked and Loaded</p>
        </div>

        <!-- Radar Canvas -->
        <canvas id="radar" class="radar-screen"></canvas>

        <!-- Instrument Panels -->
        <div class="instruments">
            <div class="panel left-panel">
                <h2>Target Acquisition</h2>
                <div class="gauge" id="target-gauge"></div>
                <p>Real-Time Tracking</p>
            </div>
            <div class="panel center-panel">
                <h2>Mission Control</h2>
                <div class="throttle">
                    <input type="range" id="throttle" min="0" max="100" value="50">
                    <span>AI Thrust: <span id="throttle-value">50%</span></span>
                </div>
                <p>Precision Analytics</p>
            </div>
            <div class="panel right-panel">
                <h2>Strike Vector</h2>
                <div class="vector-display">
                    <span class="vector-data">Bearing: 270°</span>
                    <span class="vector-data">Range: 150nm</span>
                </div>
                <p>Actionable Output</p>
            </div>
        </div>

        <!-- Eject Button (CTA) -->
        <button class="eject-btn">Engage Polario</button>
    </div>
    <script src="script.js"></script>
</body>
</html>
